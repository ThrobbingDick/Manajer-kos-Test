<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="KosManager Pro - Aplikasi Manajemen Kos & Properti" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>KosManager Pro 🏠</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f0f4f8; }
      #root { min-height: 100vh; }
      #splash { position: fixed; inset: 0; background: #4f46e5; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
      #splash h1 { color: #fff; font-size: 24px; margin: 12px 0 4px; font-weight: 900; }
      #splash p { color: rgba(255,255,255,0.7); font-size: 14px; margin: 0; }
      .splash-icon { font-size: 56px; animation: pulse 1.5s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-icon">🏠</div>
      <h1>KosManager Pro</h1>
      <p>Memuat aplikasi...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
